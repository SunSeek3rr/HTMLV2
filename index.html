<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML - Where is Alice ?</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div data-class="rabbit">
        <p data-class="dialogue__texte rabbit__texte rabbit__texte--1 active">You look pale. Are you anxious?</p>
        <p data-class="dialogue__texte rabbit__texte rabbit__texte--2">There's no point. That day would have come anyway.</p>
        <p data-class="dialogue__texte rabbit__texte rabbit__texte--3">What are you afraid of? You never really were Alice, after all.</p>
        <p data-class="dialogue__texte rabbit__texte rabbit__texte--4">Alice... It was a pretty name.</p>
    </div>
    <div data-class="alice">
        <p data-class="dialogue__texte alice__texte alice__texte--1">A bit...</p>
        <p data-class="dialogue__texte alice__texte alice__texte--2">I know... But it seemed so far.</p>
        <p data-class="dialogue__texte alice__texte alice__texte--3">...</p>
    </div>
    <div class="customCursor"></div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
